<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Checkers</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div id="content">

    <div id="header" class="intro">Witamy w Super Checkers!</div>
    <div id="desc1" class="intro">Łatwa i szybka gra w warcaby na jednem komputerze.</div>
    <div id="play" class="buttonMenu" class="intro" onclick="play()">zagrać</div>
    <div id="info" class="buttonMenu" class="intro" onclick="info()">info</div>
    <div id="desc2">(rules, about cosmetics, about us)</div>

    <div id="arena" class="playtime">
        <div id="status"></div>
        <div id="board-wrapper">
            <div id="board"></div>
        </div>
        <div id="controls">
            <div id="resetBtn">resetować</div>
        </div>
    </div>
    <div id="back" class="buttonMenu" class="playtime" onclick="back()">cofnąć</div>
    </div>
   
    <script src="script.js"></script>
</body>
</html>
